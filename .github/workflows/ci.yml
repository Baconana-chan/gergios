name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

env:
  BUILD_TYPE: Release
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        include:
          - os: ubuntu-latest
            CC: gcc
            CXX: g++
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: false

    - name: Disable git submodule cleanup
      run: |
        git config --global submodule.recurse false

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          gcc \
          g++ \
          make \
          clang \
          clang-tidy \
          cppcheck \
          lcov \
          python3 \
          python3-pip

    - name: Configure build environment
      run: |
        echo "Configuring build for Minix"
        export TOOLCHAIN_MISSING=no
        export USETOOLS=yes

    - name: Build tools
      run: |
        make -j$(nproc) do-tools
      continue-on-error: true

    - name: Build libraries
      run: |
        make -j$(nproc) do-lib
      continue-on-error: true

    - name: Build system
      run: |
        make -j$(nproc) do-build
      continue-on-error: true

    - name: Upload build artifacts
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: build-artifacts-${{ matrix.os }}
        path: |
          obj/
          destdir/
        retention-days: 7

  static-analysis:
    name: Static Analysis
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: false

    - name: Disable git submodule cleanup
      run: |
        git config --global submodule.recurse false

    - name: Install static analysis tools
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          clang-tidy \
          cppcheck \
          clang-tools-extra

    - name: Run clang-tidy
      run: |
        find . -name '*.c' -o -name '*.cpp' | head -20 | xargs clang-tidy --warnings-as-errors='*' || true
      continue-on-error: true

    - name: Run cppcheck
      run: |
        cppcheck --enable=all --inconclusive --xml --xml-version=2 . 2> cppcheck-report.xml || true
      continue-on-error: true

    - name: Upload cppcheck results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: cppcheck-report
        path: cppcheck-report.xml

  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: false

    - name: Disable git submodule cleanup
      run: |
        git config --global submodule.recurse false

    - name: Run CodeQL Analysis
      uses: github/codeql-action/init@v3
      with:
        languages: cpp, c

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3
      with:
        category: "/language:cpp"

    - name: Run dependency check
      run: |
        pip3 install safety
        safety check --json > safety-report.json || true
      continue-on-error: true

    - name: Upload safety report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: safety-report
        path: safety-report.json

  tests:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: false

    - name: Disable git submodule cleanup
      run: |
        git config --global submodule.recurse false

    - name: Install test dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          gcc \
          g++ \
          make \
          lcov

    - name: Build test framework
      run: |
        cd tests
        make -j$(nproc)
      continue-on-error: true

    - name: Run tests
      run: |
        cd tests
        make test || true
      continue-on-error: true

    - name: Generate coverage report
      if: success()
      run: |
        lcov --capture --directory . --output-file coverage.info
        lcov --remove coverage.info '/usr/*' --output-file coverage.info
        lcov --list coverage.info
      continue-on-error: true

    - name: Upload coverage to Codecov
      if: success()
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.info
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false
      continue-on-error: true

  code-quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: false
        fetch-depth: 0

    - name: Disable git submodule cleanup
      run: |
        git config --global submodule.recurse false

    - name: Install tools
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          clang-format

    - name: Check code formatting
      run: |
        find . -name '*.c' -o -name '*.h' | head -50 | xargs clang-format --dry-run --Werror || true
      continue-on-error: true

    - name: Check for common issues
      run: |
        echo "Checking for TODO/FIXME comments"
        grep -r "TODO\|FIXME" --include="*.c" --include="*.h" . | head -20 || true
        echo "Checking for debug prints"
        grep -r "printf\|printk" --include="*.c" . | grep -i "debug" | head -10 || true
