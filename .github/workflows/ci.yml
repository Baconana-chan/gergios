name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

env:
  BUILD_TYPE: Release
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ============================================================================
  # Rust Workspace — Build & Test
  # ============================================================================
  rust-build:
    name: Rust Build & Test
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: false

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        components: clippy, rustfmt

    - name: Rust cache
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: rust
        key: rust-${{ hashFiles('rust/Cargo.lock') }}

    - name: Build all crates
      run: |
        cd rust
        cargo build --workspace --verbose

    - name: Run all tests
      run: |
        cd rust
        cargo test --workspace --verbose

    - name: Clippy lint check
      run: |
        cd rust
        cargo clippy --workspace -- -D warnings 2>&1 || true
      continue-on-error: true

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: rust-test-results
        path: rust-test-results/
        retention-days: 14

  # ============================================================================
  # Rust — Sanitizer Tests (ASan, UBSan)
  # ============================================================================
  rust-sanitizers:
    name: Rust Sanitizers
    runs-on: ubuntu-latest
    # Run in parallel with rust-build — no dependency needed

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: false

    - name: Install Rust nightly (for sanitizers)
      uses: dtolnay/rust-toolchain@nightly
      with:
        components: rust-src

    - name: Rust cache (nightly)
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: rust
        key: rust-nightly-${{ hashFiles('rust/Cargo.lock') }}

    - name: Build + test with AddressSanitizer
      run: |
        cd rust
        RUSTFLAGS="-Z sanitizer=address" cargo test --workspace --verbose 2>&1 | \
          tee ../rust-test-results-asan.log || true

    - name: Build + test with UndefinedBehaviorSanitizer
      run: |
        cd rust
        RUSTFLAGS="-Z sanitizer=undefined" cargo test --workspace --verbose 2>&1 | \
          tee ../rust-test-results-ubsan.log || true

    - name: Upload sanitizer results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: rust-sanitizer-results
        path: |
          rust-test-results-asan.log
          rust-test-results-ubsan.log
        retention-days: 14

  # ============================================================================
  # Rust — Fuzz Testing (nightly + cargo-fuzz)
  # ============================================================================
  rust-fuzz:
    name: Rust Fuzz Testing
    runs-on: ubuntu-latest
    # Runs independently — no build dependency
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: false

    - name: Install Rust nightly (for fuzzing)
      uses: dtolnay/rust-toolchain@nightly

    - name: Install cargo-fuzz
      run: cargo install cargo-fuzz

    - name: Rust cache (nightly fuzz)
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: rust/fuzz
        key: rust-fuzz-${{ hashFiles('rust/fuzz/Cargo.toml') }}

    - name: Fuzz minix-rs Message validation
      run: |
        cd rust
        cargo +nightly fuzz run fuzz_minixrs_message -- \
          -max_total_time=600 2>&1 | \
          tee ../fuzz-minixrs.log || true

    - name: Fuzz net-parse TCP header
      run: |
        cd rust
        cargo +nightly fuzz run fuzz_netparse_tcp -- \
          -max_total_time=300 2>&1 | \
          tee ../fuzz-tcp.log || true

    - name: Fuzz net-parse DNS header
      run: |
        cd rust
        cargo +nightly fuzz run fuzz_netparse_dns -- \
          -max_total_time=300 2>&1 | \
          tee ../fuzz-dns.log || true

    - name: Upload fuzz artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: fuzz-artifacts
        path: |
          rust/fuzz/artifacts/
          fuzz-*.log
        retention-days: 30

  # ============================================================================
  # Rust — Code Coverage
  # ============================================================================
  rust-coverage:
    name: Rust Code Coverage
    runs-on: ubuntu-latest
    # Runs independently — no build dependency
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: false

    - name: Install Rust stable
      uses: dtolnay/rust-toolchain@stable

    - name: Install cargo-llvm-cov
      run: cargo install cargo-llvm-cov

    - name: Generate coverage
      run: |
        cargo llvm-cov --manifest-path rust/Cargo.toml --workspace --lcov --output-path rust/lcov.info

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./rust/lcov.info
        flags: rust
        name: rust-codecov
        fail_ci_if_error: false
      continue-on-error: true

    - name: Upload coverage report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: rust-coverage-report
        path: ./rust/lcov.info
        retention-days: 30

  # ============================================================================
  # Legacy BSD Make Build (existing)
  # ============================================================================
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        include:
          - os: ubuntu-latest
            CC: gcc
            CXX: g++

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: false

    - name: Disable git submodule cleanup
      run: |
        git config --global submodule.recurse false

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          gcc \
          g++ \
          make \
          clang \
          clang-tidy \
          cppcheck \
          lcov \
          python3 \
          python3-pip \
          qemu-system-x86

    - name: Configure build environment
      run: |
        echo "Configuring build for Minix"
        export TOOLCHAIN_MISSING=no
        export USETOOLS=yes

    - name: Build tools
      run: |
        make -j$(nproc) do-tools
      continue-on-error: true

    - name: Build libraries
      run: |
        make -j$(nproc) do-lib
      continue-on-error: true

    - name: Build system
      run: |
        make -j$(nproc) do-build
      continue-on-error: true

    - name: Upload build artifacts
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: build-artifacts-${{ matrix.os }}
        path: |
          obj/
          destdir/
        retention-days: 7

  # ============================================================================
  # QEMU Boot Test
  # ============================================================================
  qemu-test:
    name: QEMU Boot Test
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: false

    - name: Install QEMU
      run: |
        sudo apt-get update
        sudo apt-get install -y qemu-system-x86

    - name: Build kernel
      run: |
        make -j$(nproc) do-kernel 2>&1 | tee kernel-build.log || true

    - name: Run QEMU test
      run: |
        chmod +x scripts/run_qemu_test.sh
        bash scripts/run_qemu_test.sh 2>&1 | tee qemu-test.log || true

    - name: Upload QEMU test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: qemu-test-results
        path: |
          qemu-test-results/
          qemu-test.log
        retention-days: 14

  # ============================================================================
  # Rust — Performance Benchmarks
  # ============================================================================
  rust-benchmarks:
    name: Rust Benchmarks
    runs-on: ubuntu-latest
    # Runs on schedule or workflow_dispatch (benchmarks take ~5-10 min)
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: false

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Rust cache
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: rust
        key: rust-bench-${{ hashFiles('rust/Cargo.lock') }}

    - name: Build release binaries
      run: |
        cd rust
        cargo build --release --workspace

    - name: Install hyperfine
      run: cargo install hyperfine

    - name: Run benchmarks (CI mode)
      run: |
        bash scripts/run_benchmarks.sh --ci 2>&1 | tee benchmark.log

    - name: Upload benchmark results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: benchmark-results
        path: |
          benchmark-results/
          benchmark.log
        retention-days: 90

  # ============================================================================
  # Static Analysis (legacy)
  # ============================================================================
  static-analysis:
    name: Static Analysis
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: false

    - name: Install static analysis tools
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          clang-tidy \
          cppcheck \
          clang-tools-extra

    - name: Run clang-tidy
      run: |
        find . -name '*.c' -o -name '*.cpp' | head -20 | xargs clang-tidy --warnings-as-errors='*' || true
      continue-on-error: true

    - name: Run cppcheck
      run: |
        cppcheck --enable=all --inconclusive --xml --xml-version=2 . 2> cppcheck-report.xml || true
      continue-on-error: true

    - name: Upload cppcheck results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: cppcheck-report
        path: cppcheck-report.xml

  # ============================================================================
  # Security Scanning (legacy)
  # ============================================================================
  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: false

    - name: Run CodeQL Analysis
      uses: github/codeql-action/init@v3
      with:
        languages: cpp, c

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3
      with:
        category: "/language:cpp"

    - name: Run dependency check
      run: |
        pip3 install safety
        safety check --json > safety-report.json || true
      continue-on-error: true

    - name: Upload safety report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: safety-report
        path: safety-report.json
