# Limine configuration for GergiOS
#
# This configuration file is used by the Limine bootloader.
# Place it in the EFI System Partition or root of the boot device
# alongside the limine.sys / limine.efi files.
#
# For UEFI:  \limine.conf
# For BIOS:  /limine.conf
#
# Installation:
#   1. Create a GPT partition table with an ESP (EFI System Partition)
#   2. Copy bootloader:
#        cp limine.efi  /mnt/EFI/BOOT/BOOTX64.EFI   (UEFI)
#        limine bios-install /dev/sda                (BIOS)
#   3. Copy config and kernel:
#        cp limine.conf /mnt/
#        cp kernel      /mnt/boot/
#        cp mod*.elf    /mnt/boot/
#   4. Boot!

# Timeout in seconds before auto-boot (0 = no timeout, -1 = wait forever)
TIMEOUT=5

# Verbose level (0-3)
#VERBOSE=1

# =============================================================================
# Boot entry: GergiOS 1.0 (default)
# =============================================================================
:GergiOS 1.0
    # Boot protocol: Limine (native), multiboot1, multiboot2, or stivale
    PROTOCOL=limine

    # Kernel path: relative to the partition root
    KERNEL_PATH=boot:///kernel

    # Boot modules (server processes loaded by kernel)
    # NOTE: In Phase 2 (UEFI ESP), modules are at ESP root,
    # NOT under /boot/ (which is MFS and unreadable by Limine).
    MODULE_PATH=boot:///mod01_ds
    MODULE_PATH=boot:///mod02_rs
    MODULE_PATH=boot:///mod03_pm
    MODULE_PATH=boot:///mod04_sched
    MODULE_PATH=boot:///mod05_vfs
    MODULE_PATH=boot:///mod06_memory
    MODULE_PATH=boot:///mod07_tty
    MODULE_PATH=boot:///mod08_mib
    MODULE_PATH=boot:///mod09_vm
    MODULE_PATH=boot:///mod10_pfs
    MODULE_PATH=boot:///mod11_mfs
    MODULE_PATH=boot:///mod12_init

    # Kernel command line
    CMDLINE=rootdevname=c0d0p0

# =============================================================================
# Boot entry: GergiOS 1.0 (safe mode / single user)
# =============================================================================
:GergiOS 1.0 (Safe Mode)
    PROTOCOL=limine
    KERNEL_PATH=boot:///kernel
    MODULE_PATH=boot:///mod01_ds
    MODULE_PATH=boot:///mod02_rs
    MODULE_PATH=boot:///mod03_pm
    MODULE_PATH=boot:///mod04_sched
    MODULE_PATH=boot:///mod05_vfs
    MODULE_PATH=boot:///mod06_memory
    MODULE_PATH=boot:///mod07_tty
    MODULE_PATH=boot:///mod08_mib
    MODULE_PATH=boot:///mod09_vm
    MODULE_PATH=boot:///mod10_pfs
    MODULE_PATH=boot:///mod11_mfs
    MODULE_PATH=boot:///mod12_init
    CMDLINE=rootdevname=c0d0p0 bootopts=-s

# =============================================================================
# Boot entry: GergiOS 1.0 (serial console)
# =============================================================================
:GergiOS 1.0 (Serial Console)
    PROTOCOL=limine
    KERNEL_PATH=boot:///kernel
    MODULE_PATH=boot:///mod01_ds
    MODULE_PATH=boot:///mod02_rs
    MODULE_PATH=boot:///mod03_pm
    MODULE_PATH=boot:///mod04_sched
    MODULE_PATH=boot:///mod05_vfs
    MODULE_PATH=boot:///mod06_memory
    MODULE_PATH=boot:///mod07_tty
    MODULE_PATH=boot:///mod08_mib
    MODULE_PATH=boot:///mod09_vm
    MODULE_PATH=boot:///mod10_pfs
    MODULE_PATH=boot:///mod11_mfs
    MODULE_PATH=boot:///mod12_init
    CMDLINE=rootdevname=c0d0p0 cttyline=0 ttybaud=115200 console=tty00 consdev=com0

# =============================================================================
# Boot entry: GergiOS ARM64 (QEMU virt)
# =============================================================================
:GergiOS ARM64
    PROTOCOL=limine
    KERNEL_PATH=boot:///kernel
    CMDLINE=rootdevname=c0d0p0
    # Device Tree: QEMU generates this, or use a custom one
    # DTB_PATH=boot:///qemu-virt.dtb

# =============================================================================
# Boot entry: GergiOS ARM64 (Safe Mode)
# =============================================================================
:GergiOS ARM64 (Safe Mode)
    PROTOCOL=limine
    KERNEL_PATH=boot:///kernel
    CMDLINE=rootdevname=c0d0p0 bootopts=-s
