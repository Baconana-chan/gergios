# wolfSSL Build Configuration for MINIX
#
# This file documents the build configuration required for wolfSSL
# integration in the MINIX build system. Use these settings when
# configuring CI/CD pipelines or manual builds.

## Required Build Flags

### Make variables (for build.sh or manual make)
# These should be set in the environment or passed to build.sh -V

MKCRYPTO=yes              # Enable crypto subsystem (required for wolfSSL)
MKLIBCXX=yes              # Enable C++ library (needed by some components)

### Recommended build.sh invocation

# Native build on MINIX:
#   $ cd /usr/src
#   $ make build MKCRYPTO=yes

# Cross-build for x86_64:
#   $ cd /usr/src
#   $ sh build.sh -m amd64 -U distribution

## CI/CD Pipeline Configuration

### GitHub Actions / Jenkins / GitLab CI

environment:
  MKCRYPTO: "yes"
  MKLIBCXX: "yes"

build_steps:
  - name: "Build MINIX with wolfSSL"
    command: "make build MKCRYPTO=yes"
    timeout: 3600  # 1 hour for full build

  - name: "Run wolfSSL unit tests"
    command: |
      cd tests/crypto/libcrypto
      # Use atf-run (MINIX default) or kyua (NetBSD default)
      atf-run t_wolfssl 2>/dev/null || kyua test t_wolfssl
    timeout: 600  # 10 minutes

  - name: "Run wolfSSL security tests"
    command: |
      cd tests/crypto/libcrypto
      atf-run t_security
    timeout: 300  # 5 minutes

  - name: "Run wolfSSL compatibility tests"
    command: |
      cd tests/crypto/libcrypto
      atf-run t_compat
    timeout: 300  # 5 minutes

  - name: "Run wolfSSL performance benchmarks"
    command: |
      cd tests/crypto/libcrypto
      atf-run t_perf
    timeout: 600  # 10 minutes

  - name: "Run integration tests"
    command: |
      cd tests/integration
      for t in t_syslogd_tls t_ftp_ssl t_httpd_ssl \
               t_telnet_encrypt t_bind_dnssec t_cross_component; do
        atf-run $t
      done
    timeout: 600  # 10 minutes

### Expected test results

expected_results:
  t_wolfssl: ALL PASS    # 11 test cases
  t_security: ALL PASS   # 11 test cases (10 + 1 combined)
  t_compat: ALL PASS     # 9 test cases (8 + 1 combined)
  t_perf: ALL PASS       # 8 test cases (7 + 1 combined)
  t_syslogd_tls: ALL PASS
  t_ftp_ssl: ALL PASS
  t_httpd_ssl: ALL PASS
  t_telnet_encrypt: ALL PASS
  t_bind_dnssec: ALL PASS
  t_cross_component: ALL PASS

## Build Verification

### Quick smoke test (after build, before full test suite)

smoke_test: |
  # Verify wolfSSL library exists
  ls -la ${DESTDIR}/usr/lib/libwolfssl.*
  
  # Verify migrated binaries link against wolfSSL
  for bin in syslogd ftp httpd telnet telnetd named factor; do
    ldd ${DESTDIR}/usr/sbin/$bin 2>/dev/null | grep wolfssl || \
    ldd ${DESTDIR}/usr/bin/$bin 2>/dev/null | grep wolfssl || \
    echo "$bin: not found or not linked with wolfSSL"
  done

### Component link verification matrix

components:
  syslogd:
    binary: "${DESTDIR}/usr/sbin/syslogd"
    links: "libwolfssl"
  ftp:
    binary: "${DESTDIR}/usr/bin/ftp"
    links: "libwolfssl"
  httpd:
    binary: "${DESTDIR}/usr/sbin/httpd"
    links: "libwolfssl"
  telnet:
    binary: "${DESTDIR}/usr/bin/telnet"
    links: "libwolfssl"
  telnetd:
    binary: "${DESTDIR}/usr/libexec/telnetd"
    links: "libwolfssl"
  factor:
    binary: "${DESTDIR}/usr/games/factor"
    links: "libwolfssl"
  named:
    binary: "${DESTDIR}/usr/sbin/named"
    links: "libwolfssl"

## Troubleshooting Common Build Issues

### "undefined reference to `SSL_library_init'"
  Fix: Component Makefile missing -lwolfssl.
  Add: LDADD+= -lwolfssl

### "wolfssl/openssl/ssl.h: No such file or directory"
  Fix: Missing wolfSSL include paths in component Makefile.
  Add:
    CPPFLAGS+=-I${NETBSDSRCDIR}/crypto/external/gpl2/wolfssl/dist
    CPPFLAGS+=-I${NETBSDSRCDIR}/crypto/external/gpl2/wolfssl/dist/wolfssl
    CPPFLAGS+=-I${NETBSDSRCDIR}/crypto/external/gpl2/wolfssl/dist/wolfssl/openssl

### "assignment to member 'p' of 'DH' from incompatible type"
  Fix: Use DH_set0_pqg() instead of direct dh->p / dh->g struct access.
  See: docs/wolfssl-usage-guide.md

### "cannot find -lwolfssl"
  Fix: wolfSSL library not built. Ensure MKCRYPTO=yes.
  Check: crypto/external/gpl2/wolfssl/lib/Makefile for build errors.
